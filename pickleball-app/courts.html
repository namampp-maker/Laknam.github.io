<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courts — SmashPoint</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    /* ── Split layout ─────────────────────────────────── */
    .courts-layout {
      display: grid;
      grid-template-columns: 420px 1fr;
      height: calc(100vh - var(--nav-h) - 48px); /* subtract filter bar */
      margin-top: calc(var(--nav-h) + 48px);
    }
    .courts-panel {
      overflow-y: auto;
      border-right: 1px solid var(--border);
      scrollbar-width: thin;
      scrollbar-color: var(--surface3) transparent;
    }
    .courts-panel::-webkit-scrollbar { width: 4px; }
    .courts-panel::-webkit-scrollbar-track { background: transparent; }
    .courts-panel::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

    .map-container {
      position: sticky;
      top: calc(var(--nav-h) + 48px);
      height: calc(100vh - var(--nav-h) - 48px);
    }
    #map { width: 100%; height: 100%; }

    /* Leaflet dark overrides */
    .leaflet-container { background: #050508; }
    .leaflet-popup-content-wrapper {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border-hi);
      border-radius: var(--r-md);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .leaflet-popup-tip { background: var(--surface2); }
    .leaflet-popup-close-button { color: var(--muted) !important; }

    /* ── Court cards ──────────────────────────────────── */
    .courts-list {
      padding: var(--space-md);
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }
    .court-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: var(--space-md);
      cursor: pointer;
      transition: all 0.2s var(--ease);
    }
    .court-card:hover,
    .court-card.active {
      border-color: var(--accent);
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .court-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-sm);
      margin-bottom: var(--space-sm);
    }
    .court-name {
      font-family: var(--font-head);
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }
    .court-meta {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .court-hours {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 4px;
    }
    .court-price {
      font-family: var(--font-head);
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
    }
    .court-price.free { color: #34d399; }
    .court-rating {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.78rem;
      color: var(--muted2);
    }
    .court-actions {
      display: flex;
      gap: var(--space-sm);
      margin-top: var(--space-md);
    }
    .court-count-badge {
      font-family: var(--font-head);
      font-size: 0.72rem;
      font-weight: 700;
      background: var(--surface2);
      color: var(--muted2);
      padding: 2px 8px;
      border-radius: var(--r-pill);
      border: 1px solid var(--border);
      white-space: nowrap;
    }

    /* ── Panel header ─────────────────────────────────── */
    .panel-header {
      padding: var(--space-md);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-header h2 {
      font-family: var(--font-head);
      font-size: 1rem;
      font-weight: 600;
    }

    /* ── Popup content ────────────────────────────────── */
    .map-popup h3 {
      font-family: var(--font-head);
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--text);
    }
    .map-popup p { font-size: 0.8rem; color: var(--muted2); margin: 3px 0; }
    .map-popup a {
      display: inline-block;
      margin-top: 8px;
      font-size: 0.8rem;
      color: var(--accent);
      font-weight: 600;
    }

    @media (max-width: 900px) {
      .courts-layout {
        grid-template-columns: 1fr;
        height: auto;
        margin-top: calc(var(--nav-h) + 48px);
      }
      .map-container {
        position: relative;
        top: 0;
        height: 320px;
      }
      .courts-panel { overflow-y: visible; }
    }
  </style>
</head>
<body data-page="courts">
  <script src="js/data.js"></script>
  <script src="js/nav.js"></script>

  <!-- Filter Bar -->
  <div class="filter-bar" id="filter-bar">
    <input type="text" class="filter-input" id="f-search" placeholder="Search court name or area…">
    <select class="filter-select" id="f-district">
      <option value="all">All Districts</option>
    </select>
    <select class="filter-select" id="f-surface">
      <option value="all">Any Surface</option>
      <option value="Hard">Hard Court</option>
      <option value="Synthetic">Synthetic</option>
      <option value="Grass">Grass</option>
    </select>
    <button class="filter-toggle" id="f-lit" data-key="lit"><span class="dot"></span>Night Lit</button>
    <button class="filter-toggle" id="f-indoor" data-key="indoor"><span class="dot"></span>Indoor</button>
    <button class="filter-toggle" id="f-free" data-key="free"><span class="dot"></span>Free</button>
    <span class="filter-reset" id="f-reset">Reset</span>
    <span class="filter-count" id="f-count"></span>
  </div>

  <!-- Split layout -->
  <div class="courts-layout">
    <!-- Left panel -->
    <div class="courts-panel">
      <div class="panel-header">
        <h2>Courts in Bangkok</h2>
      </div>
      <div class="courts-list" id="courts-list"></div>
    </div>

    <!-- Right: map -->
    <div class="map-container">
      <div id="map"></div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer" style="display:none"></footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/courts.js"></script>
</body>
</html>
